<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Harmony Music Academy Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background 0.3s, color 0.2s; }
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --primary: #7c3aed; --primary-dark: #6d28d9; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        body.dark { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --border: #334155; --primary: #a78bfa; }
        body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 24px; padding: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid var(--border); margin-bottom: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        input, select, textarea { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 16px; color: var(--text); width: 100%; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .badge { padding: 4px 12px; border-radius: 40px; font-size: 12px; background: var(--border); }
        @media (max-width: 768px) { body { padding: 12px; } .card { padding: 16px; } th, td { font-size: 14px; } }
        .error-box { max-width: 600px; margin: 40px auto; padding: 20px; background: #fff3cd; border-radius: 12px; border-left: 5px solid #ffc107; }
    </style>
</head>
<body>
<div id="app" class="container"></div>

<script>
    (function() {
        // Show a temporary loading message
        document.getElementById('app').innerHTML = '<div style="text-align:center; margin-top:50px;">Loading Harmony Portal...</div>';
    })();

    // ---------- SUPABASE CONFIG ----------
    const SUPABASE_URL = 'https://ktjlmpriqxghclekqxro.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0amxtcHJpcXhnaGNsZWtxeHJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTc2NDksImV4cCI6MjA5NjczMzY0OX0.njPUK266yGgwDh8a5GUCv4lOXjS0M7hF26jvDP2iUvw';
    
    let supabaseClient;
    try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        console.log('✅ Supabase client created');
    } catch(e) {
        document.getElementById('app').innerHTML = `<div class="error-box"><h3>❌ Failed to create Supabase client</h3><p>${e.message}</p></div>`;
        throw e;
    }

    let currentUser = null;
    let academyBranding = { name: 'Harmony Music Academy', logo: '' };

    function renderPage(html) {
        const app = document.getElementById('app');
        if (app) app.innerHTML = html;
        else console.error('❌ #app element missing');
    }

    // ---------- LOAD BRANDING ----------
    async function loadBranding() {
        console.log('Loading branding...');
        try {
            const { data, error } = await supabaseClient.from('branding').select('*').maybeSingle();
            if (error) {
                console.warn('Branding table error:', error);
                // Don't fail, just use default
            } else if (data) {
                academyBranding.name = data.name || academyBranding.name;
                academyBranding.logo = data.logo || '';
            }
        } catch(e) {
            console.error('Branding exception:', e);
        }
        console.log('Branding final:', academyBranding.name);
    }

    // ---------- LOGIN PAGE ----------
    function renderLogin() {
        renderPage(`
            <div style="max-width: 400px; margin: 80px auto;">
                <div class="card" style="text-align:center;">
                    ${academyBranding.logo ? `<img src="${academyBranding.logo}" style="max-height:80px; margin-bottom:20px;">` : ''}
                    <h2>${academyBranding.name}</h2>
                    <p style="margin-bottom:24px;">Login to your portal</p>
                    <input type="email" id="loginEmail" placeholder="Email" value="admin@harmony.com">
                    <input type="password" id="loginPassword" placeholder="Password" value="admin123">
                    <button class="btn" id="doLoginBtn" style="width:100%">Login</button>
                    <div style="margin-top:16px; display:flex; justify-content:space-between;">
                        <button id="toggleThemeBtn" class="btn-outline btn" style="background:transparent;">🌓 Dark/Light</button>
                        <small style="align-self:center;">Demo: admin@harmony.com/admin123 or alice@harmony.com/student123</small>
                    </div>
                </div>
            </div>
        `);
        document.getElementById('doLoginBtn')?.addEventListener('click', doLogin);
        document.getElementById('toggleThemeBtn')?.addEventListener('click', toggleTheme);
    }

    async function doLogin() {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        try {
            const { data, error } = await supabaseClient.from('users').select('*').eq('email', email).maybeSingle();
            if (error || !data) throw new Error('Invalid credentials or missing user table');
            if (data.password !== pwd) throw new Error('Wrong password');
            currentUser = { id: data.id, email: data.email, role: data.role, name: data.full_name || data.email.split('@')[0] };
            if (data.role === 'admin') renderAdminDashboard();
            else renderStudentDashboard();
        } catch (err) {
            alert(`Login error: ${err.message}`);
        }
    }

    // ---------- ADMIN DASHBOARD (simplified for testing) ----------
    async function renderAdminDashboard() {
        renderPage(`
            <div class="flex-between">
                <h2>🎵 Admin Dashboard - ${academyBranding.name}</h2>
                <button class="btn-outline btn" id="logoutBtn">Logout</button>
            </div>
            <div class="card">
                <p>✅ You are logged in as admin. Full features will appear once tables are verified.</p>
                <p>Student management, content, announcements, etc. are ready.</p>
            </div>
        `);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        // You can re-add full features later – they are all present in your original code
    }

    // ---------- STUDENT DASHBOARD (simplified) ----------
    async function renderStudentDashboard() {
        renderPage(`
            <div class="flex-between">
                <h2>${currentUser.name}'s Portal</h2>
                <button class="btn-outline btn" id="logoutBtn">Logout</button>
            </div>
            <div class="card">
                <p>✅ Student dashboard ready.</p>
            </div>
        `);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    function logout() { currentUser = null; renderLogin(); }

    // ---------- INITIALIZATION WITH ERROR DISPLAY ----------
    (async function start() {
        try {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') document.body.classList.add('dark');
            await loadBranding();
            renderLogin();
        } catch (err) {
            console.error('FATAL:', err);
            document.getElementById('app').innerHTML = `
                <div class="error-box">
                    <h3>⚠️ Initialization Failed</h3>
                    <p><strong>Error:</strong> ${err.message}</p>
                    <p>Open the console (F12) for more details.</p>
                    <p>Common fixes:<br>
                    - Run SQL to add missing tables<br>
                    - Disable RLS on all tables in Supabase<br>
                    - Check that your Supabase URL and key are correct</p>
                </div>`;
        }
    })();
</script>
</body>
</html>

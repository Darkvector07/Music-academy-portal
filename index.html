<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Harmony Music Academy Portal</title>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: background 0.3s, color 0.2s;
        }
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
            --primary: #7c3aed;
            --primary-dark: #6d28d9;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
            --primary: #a78bfa;
        }
        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        input, select, textarea {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 16px;
            color: var(--text);
            width: 100%;
            margin-bottom: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .badge {
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            background: var(--border);
        }
        @media (max-width: 768px) {
            body { padding: 12px; }
            .card { padding: 16px; }
            th, td { font-size: 14px; }
        }
    </style>
</head>
<body>
<div id="app" class="container"></div>

<script>
    console.log('🔵 Script starting...');

    // ---------- CONFIG ----------
    const SUPABASE_URL = 'https://ktjlmpriqxghclekqxro.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0amxtcHJpcXhnaGNsZWtxeHJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTc2NDksImV4cCI6MjA5NjczMzY0OX0.njPUK266yGgwDh8a5GUCv4lOXjS0M7hF26jvDP2iUvw';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentUser = null;
    let academyBranding = { name: 'Harmony Music Academy', logo: '' };

    // ---------- CORE FUNCTIONS ----------
    async function loadBranding() {
        console.log('loadBranding called');
        try {
            const { data, error } = await supabase.from('branding').select('*').maybeSingle();
            if (error) console.warn('Branding error:', error);
            if (data) {
                academyBranding.name = data.name || academyBranding.name;
                academyBranding.logo = data.logo || '';
            }
        } catch(e) { console.error('Branding exception:', e); }
        console.log('Branding loaded:', academyBranding.name);
    }

    function renderLogin() {
        console.log('renderLogin called');
        document.getElementById('app').innerHTML = `
            <div style="max-width: 400px; margin: 80px auto;">
                <div class="card" style="text-align:center;">
                    <h2>${academyBranding.name}</h2>
                    <p>Login to your portal</p>
                    <input type="email" id="loginEmail" placeholder="Email" value="admin@harmony.com">
                    <input type="password" id="loginPassword" placeholder="Password" value="admin123">
                    <button class="btn" id="doLoginBtn">Login</button>
                    <button id="toggleThemeBtn" class="btn-outline btn">🌓 Dark/Light</button>
                </div>
            </div>
        `;
        document.getElementById('doLoginBtn')?.addEventListener('click', doLogin);
        document.getElementById('toggleThemeBtn')?.addEventListener('click', toggleTheme);
    }

    async function doLogin() {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        const { data, error } = await supabase.from('users').select('*').eq('email', email).maybeSingle();
        if (error || !data || data.password_hash !== pwd) {
            alert('Invalid credentials');
            return;
        }
        currentUser = { id: data.id, email: data.email, role: data.role, name: data.name };
        if (data.role === 'admin') renderAdminDashboard();
        else renderStudentDashboard();
    }

    // Simplified admin/student dashboards (you can keep your full versions later)
    function renderAdminDashboard() {
        document.getElementById('app').innerHTML = `<div class="card"><h2>Admin Dashboard</h2><button id="logoutBtn">Logout</button></div>`;
        document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser = null; renderLogin(); });
    }
    function renderStudentDashboard() {
        document.getElementById('app').innerHTML = `<div class="card"><h2>Student Dashboard</h2><button id="logoutBtn">Logout</button></div>`;
        document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser = null; renderLogin(); });
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    // ---------- INITIALIZATION (safe & visible) ----------
    (async function start() {
        console.log('Start function running');
        try {
            await loadBranding();
            renderLogin();
        } catch (err) {
            console.error('Init error:', err);
            document.getElementById('app').innerHTML = `
                <div style="max-width:500px; margin:3rem auto; padding:2rem; background:#fff3cd; border-radius:1rem;">
                    <h3>⚠️ Initialization Failed</h3>
                    <p>${err.message}</p>
                    <p>Open console (F12) for details.</p>
                </div>`;
        }
    })();
</script>
</body>
</html>

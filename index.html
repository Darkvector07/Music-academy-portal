<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Harmony Music Academy Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --primary: #7c3aed; --success: #10b981; --danger: #ef4444; }
        body.dark { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --border: #334155; --primary: #a78bfa; }
        body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 24px; padding: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid var(--border); margin-bottom: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        input, select, textarea { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 16px; width: 100%; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .fee-btn { padding: 4px 12px; border-radius: 40px; font-size: 12px; cursor: pointer; border: none; color: white; margin: 2px; }
        @media (max-width: 768px) { body { padding: 12px; } .card { padding: 16px; } }
    </style>
</head>
<body>
<div id="app" class="container"></div>

<script>
    // ============================================================
    // ONE-TIME SQL FIX (run in Supabase SQL editor if you still get constraint error):
    // ALTER TABLE contents DROP CONSTRAINT IF EXISTS contents_type_check;
    // ALTER TABLE contents ADD CONSTRAINT contents_type_check 
    // CHECK (type IN ('video', 'pdf', 'audio', 'document', 'Video', 'PDF', 'Audio', 'Document'));
    // ============================================================

    const SUPABASE_URL = 'https://ktjlmpriqxghclekqxro.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0amxtcHJpcXhnaGNsZWtxeHJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTc2NDksImV4cCI6MjA5NjczMzY0OX0.njPUK266yGgwDh8a5GUCv4lOXjS0M7hF26jvDP2iUvw';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;
    let academyBranding = { name: 'Harmony Music Academy', logo: '' };

    function renderPage(html) { document.getElementById('app').innerHTML = html; }

    async function loadBranding() {
        const { data, error } = await supabaseClient.from('branding').select('*').maybeSingle();
        if (!error && data) {
            academyBranding.name = data.name || academyBranding.name;
            academyBranding.logo = data.logo || '';
        }
    }

    function renderLogin() {
        renderPage(`
            <div style="max-width: 400px; margin: 80px auto;">
                <div class="card" style="text-align:center;">
                    ${academyBranding.logo ? `<img src="${academyBranding.logo}" style="max-height:80px;">` : ''}
                    <h2>${academyBranding.name}</h2>
                    <p>Login to your portal</p>
                    <input type="email" id="loginEmail" placeholder="Email" value="admin@harmony.com">
                    <input type="password" id="loginPassword" placeholder="Password" value="admin123">
                    <button class="btn" id="doLoginBtn" style="width:100%">Login</button>
                    <div style="margin-top:16px; display:flex; justify-content:space-between;">
                        <button id="toggleThemeBtn" class="btn-outline btn">🌓 Dark/Light</button>
                        <small>Demo: admin@harmony.com/admin123 or alice@harmony.com/student123</small>
                    </div>
                </div>
            </div>
        `);
        document.getElementById('doLoginBtn')?.addEventListener('click', doLogin);
        document.getElementById('toggleThemeBtn')?.addEventListener('click', toggleTheme);
    }

    async function doLogin() {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        try {
            const { data, error } = await supabaseClient.from('users').select('*').eq('email', email).maybeSingle();
            if (error || !data) throw new Error('Invalid credentials');
            if (data.password !== pwd) throw new Error('Wrong password');
            currentUser = { id: data.id, email: data.email, role: data.role, name: data.full_name || data.email.split('@')[0] };
            if (data.role === 'admin') renderAdminDashboard();
            else renderStudentDashboard();
        } catch (err) { alert(err.message); }
    }

    // ==================== ADMIN DASHBOARD ====================
    async function renderAdminDashboard() {
        const [students, contents, uploads] = await Promise.all([
            supabaseClient.from('users').select('*', { count: 'exact' }).eq('role', 'student'),
            supabaseClient.from('contents').select('*', { count: 'exact' }),
            supabaseClient.from('uploads').select('*', { count: 'exact' }).eq('seen', false)
        ]);
        renderPage(`
            <div class="flex-between" style="margin-bottom:24px;">
                <h2>🎵 Admin Dashboard - ${academyBranding.name}</h2>
                <div><button class="btn-outline btn" id="logoutBtn">Logout</button> <button id="themeBtn2" class="btn-outline btn">🌓</button></div>
            </div>
            <div class="grid-2">
                <div class="card"><h3>📊 Stats</h3><p>Students: ${students.count || 0}</p><p>Contents: ${contents.count || 0}</p><p>Unseen Uploads: ${uploads.count || 0}</p></div>
                <div class="card"><h3>🎂 Birthday & Anniversary Alerts</h3><div id="bdayAlert">Loading...</div></div>
            </div>
            <div class="card"><div class="flex-between"><h3>👩‍🎓 Student Management</h3><button class="btn" id="addStudentBtn">+ Add Student</button></div><div id="studentList"></div></div>
            <div class="card"><div class="flex-between"><h3>📚 Content Management</h3><button class="btn" id="addContentBtn">+ Add Content</button></div><div id="contentList"></div></div>
            <div class="card"><h3>📢 Announcements</h3><input id="announceTitle" placeholder="Title"><textarea id="announceMsg" placeholder="Message"></textarea><button class="btn" id="postAnnounceBtn">Post</button><div id="announcementsList"></div></div>
            <div class="card"><h3>📎 Pending Uploads</h3><div id="pendingUploads"></div></div>
        `);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('themeBtn2')?.addEventListener('click', toggleTheme);
        document.getElementById('addStudentBtn')?.addEventListener('click', showAddStudentModal);
        document.getElementById('addContentBtn')?.addEventListener('click', showAddContentModal);
        document.getElementById('postAnnounceBtn')?.addEventListener('click', postAnnouncement);
        await loadStudentTable();
        await loadContentTable();
        await loadAnnouncements();
        await loadPendingUploads();
        await loadBirthdayAlerts();
    }

    // ----- Student Table with fee toggles -----
    async function loadStudentTable() {
        const { data: students } = await supabaseClient.from('users').select('*').eq('role', 'student');
        if (!students || students.length === 0) {
            document.getElementById('studentList').innerHTML = '<p>No students found.</p>';
            return;
        }
        let html = `<table><thead><tr><th>Name</th><th>Email</th><th>Fees (Jan-Jun 2026)</th><th>Action</th></tr></thead><tbody>`;
        for (const s of students) {
            const { data: fees } = await supabaseClient.from('fees').select('*').eq('student_id', s.id).eq('academic_year', '2026');
            const months = ['Jan','Feb','Mar','Apr','May','Jun'];
            let feeHtml = '';
            for (let month of months) {
                const feeRecord = fees?.find(f => f.month === month);
                const paid = feeRecord ? feeRecord.paid : false;
                const color = paid ? '#10b981' : '#ef4444';
                feeHtml += `<button class="fee-btn" data-student="${s.id}" data-month="${month}" style="background:${color}">${month}</button> `;
            }
            html += `<tr>
                <td>${s.full_name || s.email}</td>
                <td>${s.email}</td>
                <td class="fee-cell" data-student="${s.id}">${feeHtml}</td>
                <td><button class="btn-outline btn" onclick="window.viewProfile('${s.id}')">Profile</button></td>
            </tr>`;
        }
        html += `</tbody></tr>`;
        document.getElementById('studentList').innerHTML = html;

        document.querySelectorAll('.fee-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const studentId = btn.getAttribute('data-student');
                const month = btn.getAttribute('data-month');
                await toggleFee(studentId, month, btn);
            });
        });
    }

    async function toggleFee(studentId, month, buttonElement) {
        try {
            const { data: existing, error: fetchError } = await supabaseClient
                .from('fees')
                .select('*')
                .eq('student_id', studentId)
                .eq('month', month)
                .eq('academic_year', '2026')
                .maybeSingle();
            if (fetchError) throw fetchError;

            let newPaid;
            if (existing) {
                newPaid = !existing.paid;
                await supabaseClient.from('fees').update({ paid: newPaid }).eq('id', existing.id);
            } else {
                newPaid = true;
                await supabaseClient.from('fees').insert({ student_id: studentId, month: month, academic_year: '2026', paid: true });
            }
            buttonElement.style.backgroundColor = newPaid ? '#10b981' : '#ef4444';
        } catch (err) {
            alert('Failed to update fee: ' + err.message);
        }
    }

    window.viewProfile = async (studentId) => {
        const { data: stu } = await supabaseClient.from('users').select('*').eq('id', studentId).single();
        const { data: progress } = await supabaseClient.from('progress').select('*').eq('student_id', studentId);
        const { data: contentAccess } = await supabaseClient.from('content_access').select('*, contents(*)').eq('student_id', studentId);
        alert(`Profile: ${stu.full_name || stu.name}\nProgress: ${progress?.length || 0} entries\nContent access: ${contentAccess?.length || 0} items`);
    };

    // ----- Content Management with type validation -----
    async function loadContentTable() {
        const { data: contents } = await supabaseClient.from('contents').select('*');
        if (!contents || contents.length === 0) {
            document.getElementById('contentList').innerHTML = '<p>No content yet. Add some!</p>';
            return;
        }
        let html = `<table><thead><tr><th>Title</th><th>Type</th><th>Access Control</th><th>Actions</th></tr></thead><tbody>`;
        for (const c of contents) {
            html += `<tr>
                <td>${c.title}</td>
                <td>${c.type}</td>
                <td><button class="btn-outline btn" onclick="window.manageAccess('${c.id}')">Manage Access</button></td>
                <td><button class="btn-outline btn" onclick="window.deleteContent('${c.id}')">Delete</button></td>
            </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('contentList').innerHTML = html;
    }

    window.manageAccess = async (contentId) => {
        const { data: students } = await supabaseClient.from('users').select('id,full_name').eq('role','student');
        const { data: existing } = await supabaseClient.from('content_access').select('student_id').eq('content_id', contentId);
        const existingIds = existing?.map(e=>e.student_id) || [];
        let modalHtml = `<div class="card"><h3>Grant Access to Content</h3>`;
        for (const s of students) {
            const checked = existingIds.includes(s.id);
            modalHtml += `<label><input type="checkbox" id="acc_${s.id}" ${checked ? 'checked' : ''}> ${s.full_name || s.email}</label><br>`;
        }
        modalHtml += `<button class="btn" id="saveAccessBtn">Save</button> <button class="btn-outline btn" id="closeAccessBtn">Close</button></div>`;
        const modal = document.createElement('div');
        modal.style.position='fixed'; modal.style.top='0'; modal.style.left='0'; modal.style.width='100%'; modal.style.height='100%'; modal.style.background='rgba(0,0,0,0.7)'; modal.style.display='flex'; modal.style.alignItems='center'; modal.style.justifyContent='center'; modal.style.zIndex='1000';
        modal.innerHTML = `<div style="max-width:500px; width:90%;">${modalHtml}</div>`;
        document.body.appendChild(modal);
        document.getElementById('saveAccessBtn').onclick = async () => {
            for (const s of students) {
                const isChecked = document.getElementById(`acc_${s.id}`).checked;
                const hasAccess = existingIds.includes(s.id);
                if (isChecked && !hasAccess) {
                    await supabaseClient.from('content_access').insert({ content_id: contentId, student_id: s.id });
                } else if (!isChecked && hasAccess) {
                    await supabaseClient.from('content_access').delete().eq('content_id', contentId).eq('student_id', s.id);
                }
            }
            modal.remove();
            loadContentTable();
        };
        document.getElementById('closeAccessBtn').onclick = () => modal.remove();
    };

    window.deleteContent = async (id) => { 
        await supabaseClient.from('contents').delete().eq('id', id); 
        loadContentTable(); 
    };

    // FIXED: Prevents constraint violation by using allowed types and auto-adding https://
    async function showAddContentModal() {
        const title = prompt('📘 Content Title:');
        if (!title) return;
        
        let type = prompt('📁 Type (video / pdf / audio / document):');
        if (!type) return;
        type = type.toLowerCase().trim();
        const allowedTypes = ['video', 'pdf', 'audio', 'document'];
        if (!allowedTypes.includes(type)) {
            alert('Invalid type. Please use one of: video, pdf, audio, document');
            return;
        }
        
        const description = prompt('📝 Description (optional):');
        let fileUrl = prompt('🔗 Google Drive or external file URL:\nExample: https://drive.google.com/file/d/...');
        if (!fileUrl) return;
        
        // Auto-add https:// if missing
        if (!fileUrl.startsWith('http://') && !fileUrl.startsWith('https://')) {
            fileUrl = 'https://' + fileUrl;
        }

        const { error } = await supabaseClient.from('contents').insert({
            title: title,
            type: type,
            description: description || '',
            file_url: fileUrl,
            created_at: new Date()
        });
        
        if (error) {
            alert('Error adding content: ' + error.message);
        } else {
            loadContentTable();
            alert('✅ Content added! Grant access to students via "Manage Access".');
        }
    }

    async function loadAnnouncements() {
        const { data } = await supabaseClient.from('announcements').select('*').order('created_at', { ascending: false });
        document.getElementById('announcementsList').innerHTML = data?.map(a=>`<div class="card" style="margin-top:8px;"><strong>${a.title}</strong><p>${a.message}</p><small>${new Date(a.created_at).toLocaleString()}</small></div>`).join('') || '';
    }

    async function postAnnouncement() {
        const title = document.getElementById('announceTitle').value;
        const message = document.getElementById('announceMsg').value;
        if (!title || !message) return;
        await supabaseClient.from('announcements').insert({ title, message, visible: true });
        document.getElementById('announceTitle').value = '';
        document.getElementById('announceMsg').value = '';
        loadAnnouncements();
        alert('Announcement posted! Student will see it after clicking Refresh.');
    }

    async function loadPendingUploads() {
        const { data } = await supabaseClient.from('uploads').select('*, users(full_name)').eq('seen', false);
        if (!data || data.length === 0) {
            document.getElementById('pendingUploads').innerHTML = '<p>No pending uploads.</p>';
            return;
        }
        let html = `<table><thead><tr><th>Student</th><th>File</th><th>Action</th></tr></thead><tbody>`;
        for (const u of data) {
            html += `<tr>
                <td>${u.users?.full_name || u.student_id}</td>
                <td><a href="${u.file_url}" target="_blank">${u.file_name}</a></td>
                <td><button class="btn" onclick="window.markSeen('${u.id}')">Mark Seen</button></td>
            </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('pendingUploads').innerHTML = html;
    }

    window.markSeen = async (id) => { 
        await supabaseClient.from('uploads').update({ seen: true }).eq('id', id); 
        loadPendingUploads(); 
    };

    async function loadBirthdayAlerts() {
        const { data } = await supabaseClient.from('users').select('full_name,birth_date,joining_date').eq('role','student');
        const today = new Date();
        const monthDay = `${today.getMonth()+1}-${today.getDate()}`;
        const bday = data?.filter(s=>s.birth_date?.slice(5)===monthDay) || [];
        const anni = data?.filter(s=>s.joining_date?.slice(5)===monthDay) || [];
        document.getElementById('bdayAlert').innerHTML = `<p>🎂 Birthday: ${bday.map(b=>b.full_name).join(', ') || 'None'}</p><p>🎉 Anniversary: ${anni.map(a=>a.full_name).join(', ') || 'None'}</p>`;
    }

    async function showAddStudentModal() {
        const name = prompt('Full Name');
        const email = prompt('Email');
        const pwd = prompt('Temporary password');
        if (name && email && pwd) {
            await supabaseClient.from('users').insert({ full_name: name, email, password: pwd, role: 'student', access_approved: true });
            loadStudentTable();
        }
    }

    // ==================== STUDENT DASHBOARD ====================
    async function renderStudentDashboard() {
        renderPage(`
            <div class="flex-between">
                <h2>${currentUser.name}'s Portal</h2>
                <div>
                    <button id="refreshStuBtn" class="btn-outline btn">🔄 Refresh</button>
                    <button id="logoutBtnStu" class="btn-outline btn">Logout</button>
                    <button id="themeBtnStu" class="btn-outline btn">🌓</button>
                </div>
            </div>
            <div class="card"><div class="flex-between"><h3>🏠 Home</h3><div id="studentStats"></div></div><div id="announcementsStu"></div></div>
            <div class="card"><h3>📘 Contents</h3><div id="contentsStu"></div></div>
            <div class="card"><h3>📈 My Progress</h3><input id="progressNote" placeholder="Practice note"><button class="btn" id="addProgressBtn">Add Entry</button><div id="progressList"></div></div>
            <div class="card"><h3>📂 My Files</h3><input type="file" id="fileUpload"><button class="btn" id="uploadFileBtn">Upload</button><div id="myFilesList"></div></div>
        `);
        document.getElementById('logoutBtnStu')?.addEventListener('click', logout);
        document.getElementById('themeBtnStu')?.addEventListener('click', toggleTheme);
        document.getElementById('addProgressBtn')?.addEventListener('click', addProgress);
        document.getElementById('uploadFileBtn')?.addEventListener('click', uploadFile);
        document.getElementById('refreshStuBtn')?.addEventListener('click', () => {
            loadStudentAnnouncements();
            loadStudentContents();
            loadStudentProgress();
            loadStudentFiles();
            loadStudentStats();
        });
        await loadStudentAnnouncements();
        await loadStudentContents();
        await loadStudentProgress();
        await loadStudentFiles();
        await loadStudentStats();
    }

    async function loadStudentAnnouncements() {
        const { data } = await supabaseClient.from('announcements').select('*').eq('visible', true).order('created_at', { ascending: false });
        document.getElementById('announcementsStu').innerHTML = data?.slice(0,5).map(a=>`<div><strong>${a.title}</strong>: ${a.message}</div>`).join('') || 'No announcements';
    }

    async function loadStudentContents() {
        const { data: accessible } = await supabaseClient.from('content_access').select('content_id').eq('student_id', currentUser.id);
        const accessibleIds = accessible?.map(a=>a.content_id) || [];
        if (accessibleIds.length === 0) {
            document.getElementById('contentsStu').innerHTML = '<p>No content accessible yet.</p>';
            return;
        }
        const { data } = await supabaseClient.from('contents').select('*').in('id', accessibleIds);
        document.getElementById('contentsStu').innerHTML = data?.map(c=>`<div class="card" style="margin-bottom:8px;"><strong>${c.title}</strong> (${c.type})<br>${c.description || ''}<br><a href="${c.file_url}" target="_blank" rel="noopener noreferrer">🔗 Open</a></div>`).join('') || '';
    }

    async function loadStudentProgress() {
        const { data } = await supabaseClient.from('progress').select('*').eq('student_id', currentUser.id).order('created_at', { ascending: false });
        document.getElementById('progressList').innerHTML = data?.map(p=>`<div><b>${new Date(p.created_at).toLocaleDateString()}</b>: ${p.note}</div>`).join('') || 'No progress entries';
    }

    async function addProgress() {
        const note = document.getElementById('progressNote').value;
        if (!note) return;
        await supabaseClient.from('progress').insert({ student_id: currentUser.id, note, created_at: new Date() });
        document.getElementById('progressNote').value = '';
        loadStudentProgress();
    }

    async function loadStudentFiles() {
        const { data } = await supabaseClient.from('uploads').select('*').eq('student_id', currentUser.id);
        document.getElementById('myFilesList').innerHTML = data?.map(f=>`<div><a href="${f.file_url}" target="_blank">${f.file_name}</a> <small>${new Date(f.created_at).toLocaleString()}</small></div>`).join('') || 'No files uploaded';
    }

    async function uploadFile() {
        const file = document.getElementById('fileUpload').files[0];
        if (!file) return;
        const fileName = `${Date.now()}_${file.name}`;
        const { error } = await supabaseClient.storage.from('uploads').upload(fileName, file);
        if (error) { alert('Upload failed: ' + error.message); return; }
        const { data: urlData } = supabaseClient.storage.from('uploads').getPublicUrl(fileName);
        await supabaseClient.from('uploads').insert({ student_id: currentUser.id, file_name: file.name, file_url: urlData.publicUrl, seen: false });
        alert('Uploaded!');
        loadStudentFiles();
    }

    async function loadStudentStats() {
        const { data: progress } = await supabaseClient.from('progress').select('*').eq('student_id', currentUser.id);
        document.getElementById('studentStats').innerHTML = `<p>✅ Progress entries: ${progress?.length || 0}</p>`;
    }

    function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }
    function logout() { currentUser = null; renderLogin(); }

    (async function start() {
        try {
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
            await loadBranding();
            renderLogin();
        } catch (err) {
            document.getElementById('app').innerHTML = `<div style="background:#fff3cd; padding:20px;"><h3>⚠️ Error</h3><p>${err.message}</p></div>`;
        }
    })();
</script>
</body>
</html>
